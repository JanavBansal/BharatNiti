services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: caai
      POSTGRES_PASSWORD: caai_dev
      POSTGRES_DB: caai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
