services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bharatniti
      POSTGRES_PASSWORD: bharatniti_dev
      POSTGRES_DB: bharatniti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bharatniti"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
